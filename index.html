<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Weather Dashboard</title>
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.10/css/weather-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <div class="search-controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Enter city name..." autocomplete="off">
                    <button id="searchBtn">🔍</button>
                    <div id="autocompleteResults" class="autocomplete-dropdown"></div>
                </div>
                <button id="locationBtn" class="btn-secondary">📍 Use My Location</button>
                <button id="unitToggle" class="btn-secondary">Switch to °F</button>
            </div>
            <div id="favoritesBar" class="favorites-bar"></div>
        </header>

        <main>
            <section id="currentWeather" class="current-weather-section">
                <div class="loading">Search for a city to display weather data.</div>
            </section>

            <section class="forecast-section">
                <h3>5-Day Forecast</h3>
                <div id="forecast"></div>
            </section>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/weatherService.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
